<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MiOS</title>
    <link rel="icon" type="image/png" href="icon.png" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f7fa;
            color: #1a1a2e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            max-width: 720px;
            width: 100%;
            background: #ffffff;
            border-radius: 24px;
            padding: 50px 55px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            transition: all 0.2s;
        }

        .nav {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            border-bottom: 1px solid #eaeef5;
            padding-bottom: 16px;
        }

        .nav-brand {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #1a1a2e;
            margin-right: 12px;
        }

        .nav-links {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: transparent;
            border: none;
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 500;
            color: #5a5a7a;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            background: #f0f2f8;
            color: #1a1a2e;
        }

        .nav-btn.active {
            background: #1a1a2e;
            color: #ffffff;
        }

        .page {
            display: block;
        }

        .page.hidden {
            display: none;
        }

        h1 {
            font-size: 42px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 18px;
            color: #5a5a7a;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 32px;
        }

        .btn {
            display: inline-block;
            background: #1a1a2e;
            color: #ffffff;
            padding: 16px 48px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.25s;
            border: none;
            cursor: pointer;
            width: 100%;
            text-align: center;
        }

        .btn:hover {
            background: #2d2d4e;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(26, 26, 46, 0.15);
        }

        @media (max-width: 550px) {
            .card {
                padding: 28px 22px;
            }
            h1 {
                font-size: 30px;
            }
            .btn {
                font-size: 16px;
                padding: 14px 24px;
            }
            .nav {
                gap: 12px;
            }
            .nav-brand {
                font-size: 20px;
            }
            .nav-btn {
                padding: 6px 14px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

<div class="card">

    <div class="nav">
        <div class="nav-brand">MiOS</div>
        <div class="nav-links">
            <button class="nav-btn active" data-page="editions">Редакции</button>
            <button class="nav-btn" data-page="faq">FAQ</button>
            <button class="nav-btn" data-page="contact">Связь</button>
        </div>
    </div>

    <div id="page-editions" class="page">
        <h1>MiOS</h1>
        <div class="subtitle">Выберите редакцию для скачивания</div>

        <div class="btn-group">
            <a href="RUS.iso" download="RUS.iso" class="btn">
                Скачать русскую редакцию
            </a>
            <a href="ENG.iso" download="ENG.iso" class="btn">
                Скачать английскую редакцию
            </a>
        </div>
    </div>

    <div id="page-faq" class="page hidden">
        <h1>FAQ</h1>
        <div class="subtitle">Часто задаваемые вопросы о MiOS</div>
        </div>

    <div id="page-contact" class="page hidden">
        <h1>Связь</h1>
        <div class="subtitle">Контакты и поддержка</div>
        </div>

</div>

<script>
    // Скрипт для переключения вкладок
    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            // Убираем класс active у всех кнопок
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');

            // Скрываем все страницы
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));

            // Показываем нужную страницу
            const pageId = this.dataset.page;
            document.getElementById('page-' + pageId).classList.remove('hidden');
        });
    });
</script>

</body>
</html>
